<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earrings Collection - ShaJewellers</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #fcfcfc;
      color: #333;
    }
    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .back-btn {
      text-decoration: none;
      color: #b8860b; /* Goldenrod color */
      font-weight: bold;
      border: 1px solid #b8860b;
      padding: 8px 15px;
      border-radius: 5px;
      transition: 0.3s;
    }
    .back-btn:hover {
      background-color: #b8860b;
      color: white;
    }
    h1 {
      text-align: center;
      flex-grow: 1;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .item {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
    }
    .item:hover {
      transform: translateY(-5px);
    }
    .item img {
      max-width: 100%;
      height: 250px;
      object-fit: cover; /* Keeps images uniform in size */
      border-radius: 8px;
    }
    .item h3 {
      margin: 15px 0 5px;
      font-size: 1.2rem;
    }
    .item p {
      color: #777;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="nav-header">
    <a href="index.html" class="back-btn">← Back to Home</a>
    <h1>Our Earrings Collection</h1>
    <div style="width: 120px;"></div> </div>

  <div class="gallery">
    <div class="item">
      <img src="Earrings1.JPG" alt="Gold Drop Earrings">
      <h3>Premium Gold Drops</h3>
      <p>Handcrafted 22kt Gold</p>
    </div>

    <div class="item">
      <img src="Earrings2.JPG" alt="Floral Design">
      <h3>Starred Gold Drops</h3>
      <p>Intricate flower pattern</p>
    </div>

    <div class="item">
      <img src="Earrings3.JPG" alt="Diamond Studs">
      <h3>Gold Hearts</h3>
      <p>Classic Heart Earrings</p>
    </div>
  </div>

</body>
</html>
